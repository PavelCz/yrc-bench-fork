coord_policy:
    always:
        cls: AlwaysPolicy
        agent: 'weak'
    threshold:
        cls: ThresholdPolicy
        metric: 'logit'
    timestep_random:
        cls: TimestepRandomPolicy
        baseline: False
    level_based_random:
        cls: LevelBasedRandomPolicy
        baseline: False
    ppo:
        cls: PPOPolicy
    ood:
        cls: OODPolicy
        method: 'DeepSVDD'
        feature_type: 'obs'
        collect_data_agent: 'weak'
    lightning_ae:
        cls: LightningAEPolicy
    mahalanobis_ae:
        cls: MahalanobisAEPolicy
coord_env:
    procgen:
        strong_query_cost_ratio: 0.0
        switch_agent_cost_ratio: 0.0
        act_greedy: False
    cliport:
        strong_query_cost_ratio: 0.4
        switch_agent_cost_ratio: 0.0
        act_greedy: False
    minigrid:
        strong_query_cost_ratio: 0.4
        switch_agent_cost_ratio: 0.0
        act_greedy: False
evaluation:
    procgen:
        validation_episodes: 256
        test_episodes: 256
        act_greedy: False
        video_episodes_to_collect: 16
        video_filter: ['all', 'no_death']
        video_filter_mode: 'any'
    cliport:
        validation_episodes: 64
        test_episodes: 64
        act_greedy: False
        video_filter_mode: 'any'
    minigrid:
        validation_episodes: 256
        test_episodes: 256
        act_greedy: False
        video_filter_mode: 'any'
environment:
    procgen:
        common:
            env_name: 'coinrun'
            normalize_rew: False
            num_envs: 8
            num_threads: 8
            use_backgrounds: True
            use_monochrome_assets: False
            restrict_themes: False
        train:
            distribution_mode: 'hard'
            seed: 0
            start_level: 0
            num_levels: 100000
            random_percent: 0
        val_sim:
            distribution_mode: 'hard'
            seed: 100000
            start_level: 100000
            num_levels: 256
            random_percent: 50
        val_true:
            distribution_mode: 'hard'
            seed: 200000
            start_level: 200000
            num_levels: 256
            random_percent: 50
        test:
            distribution_mode: 'hard'
            seed: 300000
            start_level: 300000
            num_levels: 5120
            random_percent: 50
    cliport:
        common:
            env_name: 'stack-block-pyramid-seq'
            normalize_rew: False
            num_envs: 1
            num_threads: 1
            assets_root: './lib/cliport/cliport/environments/assets'
            disp: False
            shared_memory: False
        train:
            distribution_mode: 'seen'
            seed: 0
            start_level: 0
            num_levels: 100000
        val_sim:
            distribution_mode: 'seen'
            seed: 0
            start_level: 50000
            num_levels: 64
        val_true:
            distribution_mode: 'unseen'
            seed: 0
            start_level: 50000
            num_levels: 64
        test:
            distribution_mode: 'unseen'
            seed: 0
            start_level: 0
            num_levels: 100000
    minigrid:
        common:
            env_name: 'MiniGrid-Dynamic-Obstacles'
            num_envs: 64
            num_threads: 8
        train:
            env_name_suffix: '-6x6-v0'
            seed: 0
        val_sim:
            env_name_suffix: '-6x6-v0'
            seed: 0
        val_true:
            env_name_suffix: '-Random-8x8-v0'
            seed: 0
        test:
            env_name_suffix: '-Random-8x8-v0'
            seed: 0
algorithm:
    always:
        dummy: null
    timestep_random:
        cls: RandomAlgorithm
    level_based_random:
        cls: RandomAlgorithm
    threshold:
        cls: ThresholdAlgorithm
        min_pct: 0
        max_pct: 101
        pct_step: 10
    ppo:
        cls: PPOAlgorithm
        log_freq: 10
        num_steps: 128
        total_timesteps: 25000000
        update_epochs: 3
        gamma: 0.999
        gae_lambda: 0.95
        num_minibatches: 8
        clip_coef: 0.2
        norm_adv: True
        clip_vloss: True
        vf_coef: 0.5
        ent_coef: 0.01
        max_grad_norm: 0.5
        learning_rate: 0.0005
    ood:
        cls: OODAlgorithm
        contamination: 0.1
        use_ae: False
        num_thresholds: 10
        epoch: 100
        batch_size: 64
        feature_size: 64
    lightning_ae:
        cls: AutoencoderAlgorithm
        epoch: 200
        batch_size: 64
        model_config_path: 'lib/pytorch_vae/configs/base_ae.yaml'
        disable_test: False 
gather_rollouts:
    num_rollouts: 256
    feature_type: 'obs'
    collect_data_agent: 'weak'
    rollout_dir: 'experiments/rollouts'
    val_rollout_dir: 'experiments/val_rollouts'