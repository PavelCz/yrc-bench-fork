# General settings
general:
    benchmark: 'procgen'
    algorithm: 'lightning_ae'
    seed: 1

# Wandb settings
wandb:
    project: 'yrc-01'

# Coordination policy settings
coord_policy:
    cls: LightningAEPolicy
    method: 'Autoencoder'
    feature_type: 'obs'
    collect_data_agent: 'weak'

# Coordination environment settings
coord_env:
    procgen:
        strong_query_cost_ratio: 0.0
        switch_agent_cost_ratio: 0.0
        act_greedy: false

# Evaluation settings
evaluation:
    procgen:
        test_episodes: 5000

eval:
    coverage_fraction: 0.05

# Environment settings
environment:
    procgen:
        common:
            env_name: 'coinrun_aisc'
            normalize_rew: False
            num_envs: 8
            num_threads: 8
            use_backgrounds: True
            use_monochrome_assets: False
            restrict_themes: False
        train:
            distribution_mode: 'hard'
            seed: 0
            start_level: 0
            num_levels: 100000
        val_sim:
            distribution_mode: 'hard'
            seed: 100000
            start_level: 100000
            num_levels: 256
        val_true:
            distribution_mode: 'hard'
            seed: 200000
            start_level: 200000
            num_levels: 256
        test:
            distribution_mode: 'hard'
            seed: 300000
            start_level: 300000
            num_levels: 1024
            
# File settings
file_name: 'trained.pt'
