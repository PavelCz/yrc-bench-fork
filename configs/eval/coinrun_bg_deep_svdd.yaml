# General settings
general:
    benchmark: 'procgen'
    algorithm: 'ood'
    seed: 1

# Wandb settings
wandb:
    project: 'yrc-01'


# Evaluation settings
evaluation:
    procgen:
        test_episodes: 5120

eval:
    coverage_fraction: 0.05

# Inherit all settings from common.yaml
environment: 
    common:
        env_name: 'coinrun_aisc'
        normalize_rew: False
        num_envs: 8
        num_threads: 8
        use_backgrounds: True
        use_monochrome_assets: False
        restrict_themes: False
    train:
        distribution_mode: 'hard'
        seed: 0
        start_level: 0
        num_levels: 100000
    val_sim:
        distribution_mode: 'hard'
        seed: 100000
        start_level: 100000
        num_levels: 256
    val_true:
        distribution_mode: 'hard'
        seed: 200000
        start_level: 200000
        num_levels: 256
    test:
        distribution_mode: 'hard'
        seed: 300000
        start_level: 300000
        num_levels: 5120
coord_env: null
coord_policy:
    cls: OODPolicy
    feature_type: 'obs'
    collect_data_agent: 'weak'
    method: 'DeepSVDD'
algorithm: null
            
# File settings
file_name: 'trained.joblib'
