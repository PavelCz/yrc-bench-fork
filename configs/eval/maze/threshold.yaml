# General settings
general:
    benchmark: 'procgen'
    algorithm: 'threshold'
    seed: 1

# Wandb settings
wandb:
    project: 'yrc-01'


# Evaluation settings
evaluation:
    coverage_fraction: 0.05
    threshold_sampler: 'ood_percentage'
    video_episodes_to_collect: 16
    video_filter: ['all']
    
    # Enable random environment switching
    use_random_env_switch: True
    random_env_switch:
        # Configuration for first environment
        env1:
            gym_name: 'maze_aisc'  # Direct gym environment name
            num_levels: 5120
            start_level: 300000
            distribution_mode: 'hard'
            seed: 300000
            # Optional: num_envs, num_threads will inherit from common config if not specified
        
        # Configuration for second environment
        env2:
            gym_name: 'maze'  # Direct gym environment name
            num_levels: 5120
            start_level: 300000
            distribution_mode: 'hard'
            seed: 300000
        
        # Probability (0-100) of choosing env1 on reset for each sub-env
        # For example, 70 means 70% chance of using env1, 30% chance of using env2
        random_percent: 50
    
# Inherit all settings from common.yaml
environment: 
    common:
        env_name: 'maze'
        normalize_rew: False
        num_envs: 8
        num_threads: 8
        use_backgrounds: True
        use_monochrome_assets: False
        restrict_themes: False
    train:
        distribution_mode: 'hard'
        seed: 0
        start_level: 0
        num_levels: 100000
        random_percent: 0
    val_sim:
        distribution_mode: 'hard'
        seed: 100000
        start_level: 100000
        num_levels: 256
        random_percent: 50
    val_true:
        distribution_mode: 'hard'
        seed: 200000
        start_level: 200000
        num_levels: 256
        random_percent: 50
    test:
        distribution_mode: 'hard'
        seed: 300000
        start_level: 300000
        num_levels: 5120
coord_env: null
coord_policy:
    cls: ThresholdPolicy
    feature_type: 'obs'
    collect_data_agent: 'weak'
    metric: 'max_prob'
algorithm: null

